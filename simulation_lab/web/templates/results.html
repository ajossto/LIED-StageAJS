<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simulation Lab - Résultats</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body data-page="results">
  <header class="topbar">
    <div>
      <h1>Simulation Lab</h1>
      <p class="muted">Navigation dans les modélisations passées</p>
    </div>
    <nav class="topnav">
      <a class="nav-link" href="/launch">Lancement</a>
      <a class="nav-link active" href="/results">Résultats</a>
    </nav>
  </header>

  <main class="results-grid">
    <section class="panel">
      <div class="toolbar">
        <div>
          <h2>Exécutions en cours</h2>
          <p class="help">Même file de jobs que dans l’onglet lancement.</p>
        </div>
      </div>
      <div id="jobs-list" class="jobs-list compact-jobs"></div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <h2>Simulations</h2>
        <button id="refresh-runs">Rafraîchir</button>
      </div>
      <div class="filter-row">
        <button class="secondary" data-scope="active">Actives</button>
        <button class="secondary" data-scope="trash">Corbeille</button>
      </div>
      <div id="study-filter" class="study-filter hidden">
        <strong>Filtre étude de sensibilité</strong>
        <div class="study-filter-row">
          <label>Groupe</label>
          <select id="study-group">
            <option value="">Tous les groupes</option>
            <option value="exploratoire">Exploration initiale</option>
            <option value="oat">OAT (One-at-a-time)</option>
            <option value="couplages">Couplages 2D</option>
            <option value="multirun">Multi-seeds probabiliste</option>
            <option value="predictabilite">Prédictabilité</option>
            <option value="long_runs">Long runs</option>
            <option value="direct">Simulations directes</option>
          </select>
        </div>
        <div class="study-filter-row">
          <label>Campagne</label>
          <select id="study-campaign">
            <option value="">Toutes campagnes</option>
            <optgroup label="Exploration">
              <option value="alpha_sigma">alpha_sigma</option>
              <option value="k_sweep">k_sweep</option>
              <option value="epsilon_runtime">epsilon_runtime</option>
              <option value="pilot">pilot</option>
              <option value="lab_guided_probe">lab_guided_probe</option>
            </optgroup>
            <optgroup label="OAT">
              <option value="codex_oat_steps1500_seeds42">OAT Codex seed=42</option>
              <option value="claude_oat_robustness">OAT robustesse seeds 7+123</option>
              <option value="claude_lambda_fine_sweep">Balayage fin lambda</option>
            </optgroup>
            <optgroup label="Couplages 2D">
              <option value="claude_coupling_lambda_k">λ × k</option>
              <option value="claude_coupling_k_mu">k × μ</option>
              <option value="claude_coupling_sigma_k">σ × k</option>
              <option value="claude_coupling_theta_depr">θ × δ_endo</option>
            </optgroup>
            <optgroup label="Autres">
              <option value="claude_multirun_limits">Multi-seeds probabiliste</option>
              <option value="claude_predictability">Prédictabilité</option>
              <option value="claude_long_run_k3sigma0005">Long run k3σ=0.005</option>
              <option value="codex_long_probe_steps3000_seeds42">Sonde longue Codex</option>
            </optgroup>
          </select>
        </div>
        <div class="study-filter-row">
          <label><input type="checkbox" id="study-filter-bounded"> Queue bornée</label>
          <label><input type="checkbox" id="study-filter-drop5"> Drop 5%</label>
          <label><input type="checkbox" id="study-filter-converged"> Régime strict</label>
        </div>
      </div>
      <div id="runs-list" class="runs-list"></div>
      <div id="trash-actions" class="inline-actions hidden">
        <button id="empty-trash" class="secondary">Vider la corbeille</button>
      </div>
    </section>

    <section class="panel">
      <h2>Détail</h2>
      <div id="run-detail" class="detail muted">Sélectionnez une simulation.</div>
      <div id="artifacts-grid" class="artifacts-grid"></div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
